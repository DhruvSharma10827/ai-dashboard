# AI Dashboard - Comprehensive CI/CD Pipeline
# Runs on: push, pull_request, and manual trigger
# Builds: Windows (.exe), Linux (binary), Source distribution

name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run with debug logging'
        required: false
        default: 'false'
        type: boolean

# Force Node.js 24 for all actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===========================================================================
  # CODE QUALITY - Linting, Type Checking, Security Scanning
  # ===========================================================================
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Ruff - Fast Linter and Formatter (replaces flake8, isort, black, pydocstyle, etc.)
      - name: Run Ruff (Linting)
        run: ruff check . --output-format=github

      - name: Run Ruff (Format Check)
        run: ruff format --check .

      # MyPy - Static Type Checking
      - name: Run MyPy (Type Checking)
        run: mypy dashboard.py --strict
        continue-on-error: false

      # Bandit - Security Linting
      - name: Run Bandit (Security Scan)
        run: bandit -c pyproject.toml -r dashboard.py
        continue-on-error: false

      # Pylint - Code Quality Analysis
      - name: Run Pylint (Code Quality)
        run: pylint dashboard.py --rcfile=pyproject.toml
        continue-on-error: true

      # pydocstyle - Docstring Checking
      - name: Run pydocstyle (Docstring Check)
        run: pydocstyle dashboard.py
        continue-on-error: true

      # Vulture - Dead Code Detection
      - name: Run Vulture (Dead Code)
        run: vulture dashboard.py --min-confidence 80
        continue-on-error: true

      # pyroma - Package Quality
      - name: Run pyroma (Package Check)
        run: pyroma -n 10 .
        continue-on-error: true

      # Check for common issues
      - name: Check for secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline || true

  # ===========================================================================
  # SECURITY SCAN - Dependency Vulnerabilities
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install safety and pip-audit
        run: pip install safety pip-audit

      - name: Run Safety (Dependency Vulnerabilities)
        run: safety check --full-report || true
        continue-on-error: true

      - name: Run pip-audit
        run: pip-audit || true
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
        continue-on-error: true

  # ===========================================================================
  # BUILD - Create Executables for Multiple Platforms
  # ===========================================================================
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build Linux binary with PyInstaller
        run: |
          pyinstaller --onefile \
            --name ai-dashboard-linux \
            --add-data "dashboard.py:." \
            --hidden-import=textual \
            --hidden-import=rich \
            --hidden-import=argon2 \
            --collect-all textual \
            --collect-all rich \
            dashboard.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-dashboard-linux
          path: dist/ai-dashboard-linux
          retention-days: 30

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    needs: [code-quality]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build Windows executable with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --name ai-dashboard `
            --add-data "dashboard.py;." `
            --hidden-import=textual `
            --hidden-import=rich `
            --hidden-import=argon2 `
            --collect-all textual `
            --collect-all rich `
            dashboard.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-dashboard-windows
          path: dist/ai-dashboard.exe
          retention-days: 30

  build-macos:
    name: Build macOS Binary
    runs-on: macos-latest
    needs: [code-quality]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build macOS binary with PyInstaller
        run: |
          pyinstaller --onefile \
            --name ai-dashboard-macos \
            --add-data "dashboard.py:." \
            --hidden-import=textual \
            --hidden-import=rich \
            --hidden-import=argon2 \
            --collect-all textual \
            --collect-all rich \
            dashboard.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-dashboard-macos
          path: dist/ai-dashboard-macos
          retention-days: 30

  # ===========================================================================
  # SOURCE DISTRIBUTION
  # ===========================================================================
  build-sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install build tools
        run: pip install build

      - name: Build source distribution
        run: python -m build --sdist

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: ai-dashboard-sdist
          path: dist/*.tar.gz
          retention-days: 30

  # ===========================================================================
  # RELEASE - Create GitHub Release with Artifacts
  # ===========================================================================
  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/ai-dashboard-linux/ai-dashboard-linux release/ai-dashboard-linux
          cp artifacts/ai-dashboard-windows/ai-dashboard.exe release/ai-dashboard.exe
          cp artifacts/ai-dashboard-macos/ai-dashboard-macos release/ai-dashboard-macos
          cp artifacts/ai-dashboard-sdist/*.tar.gz release/

      - name: Create checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # NOTIFY - Status Notification
  # ===========================================================================
  notify:
    name: Notify Status
    needs: [code-quality, build-linux, build-windows, build-macos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          echo "## CI/CD Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux Build | ${{ needs.build-linux.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows Build | ${{ needs.build-windows.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Build | ${{ needs.build-macos.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
