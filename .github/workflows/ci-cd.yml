# AI Dashboard - Unified CI/CD Pipeline
# Single workflow for all builds, tests, and releases

name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Force Node.js 24 for all actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.11'
  APP_NAME: 'ai-dashboard'
  APP_VERSION: '1.0.0'

jobs:
  # ===========================================================================
  # CODE QUALITY - Linting and Type Checking
  # ===========================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install ruff mypy textual rich argon2-cffi

      - name: Run Ruff (Linting)
        run: ruff check src/ tests/ --output-format=github

      - name: Run Ruff (Format Check)
        run: ruff format --check src/ tests/

      - name: Run MyPy (Type Checking)
        run: mypy src/ai_dashboard/ --ignore-missing-imports
        continue-on-error: true

      - name: Run Tests
        run: pytest tests/ -v

      - name: Validate Textual CSS
        run: |
          echo "Validating Textual CSS..."
          python test_css.py

  # ===========================================================================
  # BUILD WINDOWS EXECUTABLE
  # ===========================================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pyinstaller textual rich argon2-cffi httpx aiohttp pydantic cryptography

      - name: Build Windows executable with spec file
        run: |
          pyinstaller ai-dashboard.spec --noconfirm
        shell: pwsh

      - name: Test Windows executable
        run: |
          echo "Testing Windows executable..."
          $process = Start-Process -FilePath "dist/ai-dashboard.exe" -ArgumentList "--help" -NoNewWindow -PassThru -Timeout 10
          if ($process.ExitCode -eq 0) {
            echo "✅ Windows executable test passed"
          } else {
            echo "⚠️ Windows executable exited with code: $($process.ExitCode)"
          }
        shell: pwsh
        continue-on-error: true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-dashboard-windows
          path: dist/ai-dashboard.exe
          retention-days: 30

  # ===========================================================================
  # BUILD LINUX EXECUTABLE
  # ===========================================================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pyinstaller textual rich argon2-cffi httpx aiohttp pydantic cryptography

      - name: Build Linux executable with spec file
        run: |
          pyinstaller ai-dashboard.spec --noconfirm

      - name: Test Linux executable
        run: |
          echo "Testing Linux executable..."
          chmod +x dist/ai-dashboard
          timeout 5s ./dist/ai-dashboard --help || echo "✅ Linux executable test completed"
        continue-on-error: true

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-dashboard-linux
          path: dist/ai-dashboard
          retention-days: 30

  # ===========================================================================
  # BUILD MACOS EXECUTABLE
  # ===========================================================================
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pyinstaller textual rich argon2-cffi httpx aiohttp pydantic cryptography

      - name: Build macOS executable with spec file
        run: |
          pyinstaller ai-dashboard.spec --noconfirm

      - name: Test macOS executable
        run: |
          echo "Testing macOS executable..."
          chmod +x dist/ai-dashboard
          timeout 5s ./dist/ai-dashboard --help || echo "✅ macOS executable test completed"
        continue-on-error: true

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-dashboard-macos
          path: dist/ai-dashboard
          retention-days: 30

  # ===========================================================================
  # CREATE RELEASE
  # ===========================================================================
  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/ai-dashboard-linux/ai-dashboard release/ai-dashboard-linux 2>/dev/null || true
          cp artifacts/ai-dashboard-windows/ai-dashboard.exe release/ai-dashboard-windows.exe 2>/dev/null || true
          cp artifacts/ai-dashboard-macos/ai-dashboard release/ai-dashboard-macos 2>/dev/null || true
          cd release && sha256sum * > checksums.txt 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # NOTIFY STATUS
  # ===========================================================================
  notify:
    name: Notify Status
    needs: [lint, build-windows, build-linux, build-macos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          echo "## CI/CD Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows Build | ${{ needs.build-windows.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux Build | ${{ needs.build-linux.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Build | ${{ needs.build-macos.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
