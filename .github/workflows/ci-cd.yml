# AI Dashboard - Unified CI/CD Pipeline
# Single workflow for all builds, tests, and releases

name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Force Node.js 24 for all actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.11'
  APP_NAME: 'ai-dashboard'
  APP_VERSION: '1.0.0'

jobs:
  # ===========================================================================
  # CODE QUALITY - Linting and Type Checking
  # ===========================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff (Linting)
        run: ruff check . --output-format=github

      - name: Run Ruff (Format Check)
        run: ruff format --check .

      - name: Run MyPy (Type Checking)
        run: mypy dashboard.py --ignore-missing-imports
        continue-on-error: true

  # ===========================================================================
  # BUILD WINDOWS EXECUTABLE
  # ===========================================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install textual rich argon2-cffi httpx aiohttp pydantic pyinstaller

      - name: Build Windows executable
        run: |
          pyinstaller --onefile --windowed `
            --name ai-dashboard `
            --hidden-import=textual `
            --hidden-import=rich `
            --hidden-import=argon2 `
            --collect-all textual `
            --collect-all rich `
            dashboard.py
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-dashboard-windows
          path: dist/ai-dashboard.exe
          retention-days: 30

  # ===========================================================================
  # BUILD LINUX EXECUTABLE
  # ===========================================================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install textual rich argon2-cffi httpx aiohttp pydantic pyinstaller

      - name: Build Linux executable
        run: |
          pyinstaller --onefile \
            --name ai-dashboard-linux \
            --hidden-import=textual \
            --hidden-import=rich \
            --hidden-import=argon2 \
            --collect-all textual \
            --collect-all rich \
            dashboard.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-dashboard-linux
          path: dist/ai-dashboard-linux
          retention-days: 30

  # ===========================================================================
  # BUILD MACOS EXECUTABLE
  # ===========================================================================
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install textual rich argon2-cffi httpx aiohttp pydantic pyinstaller

      - name: Build macOS executable
        run: |
          pyinstaller --onefile \
            --name ai-dashboard-macos \
            --hidden-import=textual \
            --hidden-import=rich \
            --hidden-import=argon2 \
            --collect-all textual \
            --collect-all rich \
            dashboard.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-dashboard-macos
          path: dist/ai-dashboard-macos
          retention-days: 30

  # ===========================================================================
  # BUILD DOCKER IMAGE
  # ===========================================================================
  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get lowercase repo name
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:latest
            ghcr.io/${{ steps.repo.outputs.name }}:${{ env.APP_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # CREATE RELEASE
  # ===========================================================================
  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/ai-dashboard-linux/ai-dashboard-linux release/ 2>/dev/null || true
          cp artifacts/ai-dashboard-windows/ai-dashboard.exe release/ 2>/dev/null || true
          cp artifacts/ai-dashboard-macos/ai-dashboard-macos release/ 2>/dev/null || true
          cd release && sha256sum * > checksums.txt 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # NOTIFY STATUS
  # ===========================================================================
  notify:
    name: Notify Status
    needs: [lint, build-windows, build-linux, build-macos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          echo "## CI/CD Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows Build | ${{ needs.build-windows.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux Build | ${{ needs.build-linux.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Build | ${{ needs.build-macos.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
